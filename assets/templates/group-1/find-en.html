<div id="find-1">

        <div id="path"></div>

<div class="view-tabs" role="tablist" aria-label="View mode">

    File View
  </button>
  <button id="tab-person" role="tab" aria-selected="false" class="view-tab">
    Person View
  </button>
</div>

    <div class="content">
        <div id="files" class="scrollable">

                <thead>
                    <tr>
