<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Policy Visualisation Study - Thank You</title>
<link rel="stylesheet" href="assets/css/global.css">
<link rel="icon" type="image/x-icon" href="assets/images/logo.png">
<script src="assets/js/final.js" defer></script>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-label">Thank You!</div>
</header>

<!-- Main content -->
<main class="informative">
    <h1 id="thankYouHeader">Thank you for participating!</h1>
    <p id="thankYouSubtext">We appreciate your time and effort in completing the study.</p>
    
    <div class="survey-box" style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
        <p id="surveyInstruction">You’re almost done! Please answer <b>two final questions</b> about your experience.</p>
        <p><strong id="timeLabel">Estimated time:</strong> <span id="timeValue">Less than 1 minute</span></p>
        <button id="qualtricsButton" class="cta-button">Complete Final 2 Questions</button>
    </div>
</main>

</body>
</html>
